plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    namespace 'com.teacher.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.teacher.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = "11"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    // لا توجد مكتبات خارجية - فقط Android SDK
}
